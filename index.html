<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Codeword</title>
  <meta name="description" content="Solve a fresh codeword every day in a clean browser-based puzzle with a shared daily grid.">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-title" content="Daily Codeword">
  <link rel="canonical" href="https://wodecords.netlify.app/">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="assets/favicon-32x32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="assets/favicon-16x16.png" sizes="16x16" type="image/png">
  <link rel="shortcut icon" href="assets/favicon.ico">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Daily Codeword">
  <meta property="og:title" content="Daily Codeword">
  <meta property="og:description" content="Solve a fresh codeword every day in a clean browser-based puzzle with a shared daily grid.">
  <meta property="og:url" content="https://wodecords.netlify.app/">
  <meta property="og:image" content="https://wodecords.netlify.app/assets/social-preview.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Daily Codeword branding with a stylized numbered puzzle board.">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Daily Codeword">
  <meta name="twitter:description" content="Solve a fresh codeword every day in a clean browser-based puzzle with a shared daily grid.">
  <meta name="twitter:image" content="https://wodecords.netlify.app/assets/social-preview.png">
  <meta name="twitter:image:alt" content="Daily Codeword branding with a stylized numbered puzzle board.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Daily Codeword</h1>
      <p class="date" id="puzzle-date"></p>
    </header>

    <div id="loading">
      <p>Generating today's puzzle...</p>
    </div>

    <div id="game-container" class="hidden">
      <div class="toolbar">
        <div class="timer">
          <span id="timer-display">00:00</span>
          <button id="timer-toggle" title="Start/Stop timer">Start</button>
          <button id="timer-reset" title="Reset timer">Reset</button>
        </div>
        <div class="actions">
          <button id="btn-check">Check</button>
          <button id="btn-reveal-letter">Reveal Letter</button>
          <button id="btn-reveal-all">Solution</button>
        </div>
      </div>

      <div id="grid-wrapper">
        <div id="grid"></div>
      </div>

      <div id="letter-strip">
        <!-- A-Z with their code numbers -->
      </div>

      <div id="message" class="hidden"></div>
      <input
        id="entry-input"
        class="entry-input"
        type="text"
        inputmode="text"
        autocapitalize="characters"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        enterkeyhint="done"
        aria-label="Enter puzzle letters"
        tabindex="-1"
      >
    </div>
  </div>

  <script src="js/seedrandom.js"></script>
  <script src="js/words.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
